services:
  db:
    image: mysql:8.4
    container_name: furia_hours_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-furia_hours}
      MYSQL_USER: ${MYSQL_USER:-furia}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-furia123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: furia_hours_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - ./:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "/app/entrypoint.sh"]

volumes:
  mysql_data:
  media_data:
